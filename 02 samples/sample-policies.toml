# ==============================================================================
# Gemini CLI Sample Policy Configuration
#
# This file contains sample configurations for Gemini CLI policies.
# Copy this file to ~/.gemini/policies/ (macOS/Linux) or 
# $env:USERPROFILE\.gemini\policies\ (Windows) to apply these rules.
#
# Policies are evaluated based on their priority. The first matching rule
# determines the outcome for a given tool call.
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. Global / Fallback Policies (Lowest Priority)
# ------------------------------------------------------------------------------
# By default, we deny all tools to enforce an explicit allowlist.
[[rule]]
priority = 50
toolName = "*"
decision = "deny"

# ------------------------------------------------------------------------------
# 2. Allow Core Tools & Safe Read-Only Commands
# ------------------------------------------------------------------------------
# Explicitly allow safe read operations and file discovery tools.
[[rule]]
priority = 100
toolName = "read_file"
decision = "allow"

[[rule]]
priority = 100
toolName = "glob"
decision = "allow"

[[rule]]
priority = 100
toolName = "search_web"
decision = "allow"

[[rule]]
priority = 100
toolName = "run_shell_command"
decision = "allow"
commandPrefix = [
  "git status",
  "git log",
  "git branch",
  "git diff",
  "ls",
  "cat",
  "echo",
  "grep",
  "find"
]

# ------------------------------------------------------------------------------
# 3. Require User Confirmation for Mutating Commands
# ------------------------------------------------------------------------------
# Require explicit user confirmation before executing potentially
# state-mutating commands like pushing code or removing files.
[[rule]]
priority = 150
toolName = "run_shell_command"
decision = "ask_user"
commandPrefix = [
  "git push",
  "rm",
  "mv",
  "cp"
]

# ------------------------------------------------------------------------------
# 4. Deny Destructive & Sensitive Commands
# ------------------------------------------------------------------------------
# Explicitly deny commands that could be excessively destructive or touch system files.
# This overrides the "ask_user" rules above due to higher priority (200 > 150).
[[rule]]
priority = 200
toolName = "run_shell_command"
decision = "deny"
commandPrefix = [
  "rm -rf /",
  "mkfs",
  "su",
  "sudo"
]

# Deny writing to sensitive system paths.
# We use argsPattern to match the start of the file path argument.
[[rule]]
priority = 200
toolName = "write_file"
decision = "deny"
argsPattern = "^/(system|proc|sys)/.*"

# ------------------------------------------------------------------------------
# 5. General MCP Server Allowances
# ------------------------------------------------------------------------------
# Allow trusted servers to operate. (Note: specific tools can still be blocked later)
[[rule]]
priority = 100
mcpName = "github-company"
decision = "allow"

[[rule]]
priority = 100
mcpName = "web-search"
decision = "allow"

[[rule]]
priority = 100
mcpName = "code-analysis"
decision = "allow"

# ------------------------------------------------------------------------------
# 6. Specific MCP Tool Restrictions (The "Include List" pattern)
# ------------------------------------------------------------------------------

# --- GitHub Company ---
# Explicitly allow specific GitHub actions
[[rule]]
priority = 250
mcpName = "github-company"
decision = "allow"
toolName = [
  "mcp_github_company_search_repositories",
  "mcp_github_company_get_repository_info",
  "mcp_github_company_list_files",
  "mcp_github_company_read_file",
  "mcp_github_company_search_code",
  "mcp_github_company_get_issues",
  "mcp_github_company_get_pull_requests",
  "mcp_github_company_create_issue",
  "mcp_github_company_comment_on_issue"
]

# Deny all other GitHub actions (like deleting repos or branches)
[[rule]]
priority = 240
mcpName = "github-company"
toolName = "mcp_github_company_*"
decision = "deny"

# --- Web Search ---
[[rule]]
priority = 250
mcpName = "web-search"
decision = "allow"
toolName = [
  "mcp_web_search_search_web",
  "mcp_web_search_get_page_content"
]

[[rule]]
priority = 240
mcpName = "web-search"
toolName = "mcp_web_search_*"
decision = "deny"

# --- Code Analysis ---
[[rule]]
priority = 250
mcpName = "code-analysis"
decision = "allow"
toolName = [
  "mcp_code_analysis_analyze_code_quality",
  "mcp_code_analysis_find_vulnerabilities",
  "mcp_code_analysis_suggest_improvements"
]

# ------------------------------------------------------------------------------
# 7. Completely Deny Untrusted MCP Servers (Highest Priority)
# ------------------------------------------------------------------------------
[[rule]]
priority = 300
mcpName = "experimental-lab"
decision = "deny"

[[rule]]
priority = 300
mcpName = "untrusted-third-party"
decision = "deny"
